sonar.projectKey=planutrip
sonar.organization=rafaelgslima

# Source code
sonar.sources=apps/web/src
sonar.tests=apps/web/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

# Exclude files from coverage metrics (they won't count towards the gate)
sonar.coverage.exclusions=**/types.ts,**/*.d.ts

# Exclude from analysis
sonar.exclusions=**/node_modules/**

# Only count actual new lines in PR (not entire files touched)
sonar.newCodeDefinitionType=reference_branch
sonar.newCodeDefinitionValue=master

# Language
sonar.language=ts
