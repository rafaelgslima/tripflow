sonar.projectKey=tripflow
sonar.organization=rafael-gslima

# Source code
sonar.sources=apps/web/src
sonar.tests=apps/web/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx

# Language
sonar.language=ts
