name: CI

on:
  pull_request:
    branches: [master, production]
  push:
    branches: [master, production]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter @planutrip/web lint

      - name: Type check
        run: pnpm --filter @planutrip/web type-check

      - name: Unit tests
        run: pnpm --filter @planutrip/web test:run

      - name: Generate coverage report
        run: pnpm --filter @planutrip/web test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
